<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Advanced Age Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>🎂 Age Calculator</h1>

    <div class="input-box">
        <label>Select Date of Birth:</label>
        <input type="date" id="dob">
    </div>

    <div class="buttons">
        <button id="calcBtn">Calculate Age</button>
        <button id="resetBtn">Reset</button>
    </div>

    <div class="result">
        <p id="output"></p>
        <p id="nextBirthday"></p>
    </div>

    <div class="clock">
        ⏰ <span id="liveClock"></span>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
